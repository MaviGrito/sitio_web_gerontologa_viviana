[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "18"

# Redirección de dominio sin www a www
[[redirects]]
  from = "https://gerontologaviviana.com/*"
  to = "https://www.gerontologaviviana.com/:splat"
  status = 301
  force = true

# CMS admin
[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

[context.production.environment]
  SITE_URL = "https://www.gerontologaviviana.com"

[context.deploy-preview.environment]
  SITE_URL = "https://deploy-preview-$DEPLOY_ID--sitiowebgerontologavivianatonguino.netlify.app"

[context.branch-deploy.environment]
  SITE_URL = "https://$BRANCH--sitiowebgerontologavivianatonguino.netlify.app"

# Headers para evitar caché agresivo
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"